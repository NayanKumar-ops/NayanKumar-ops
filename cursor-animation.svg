<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">

  <defs>

    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">

      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>

      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>

    </filter>

    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">

      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>

      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>

    </filter>

    <filter id="textAura" x="-50%" y="-50%" width="200%" height="200%">

      <feGaussianBlur stdDeviation="12" result="blur1"/>

      <feGaussianBlur stdDeviation="25" result="blur2"/>

      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>

    </filter>



    <linearGradient id="goldWave" x1="0%" y1="0%" x2="100%" y2="0%">

      <stop offset="0%" stop-color="#f9e076"><animate attributeName="stop-color" values="#f9e076;#d4af37;#f9e076" dur="4s" repeatCount="indefinite"/></stop>

      <stop offset="50%" stop-color="#ffffff"><animate attributeName="stop-color" values="#ffffff;#f9e076;#ffffff" dur="6s" repeatCount="indefinite"/></stop>

      <stop offset="100%" stop-color="#d4af37"><animate attributeName="stop-color" values="#d4af37;#f9e076;#d4af37" dur="4s" repeatCount="indefinite"/></stop>

      <animate attributeName="x1" values="-100%;100%" dur="8s" repeatCount="indefinite"/>

      <animate attributeName="x2" values="0%;200%" dur="8s" repeatCount="indefinite"/>

    </linearGradient>



    <linearGradient id="cyanWave" x1="0%" y1="0%" x2="100%" y2="0%">

      <stop offset="0%" stop-color="#00f0ff"/>

      <stop offset="50%" stop-color="#0066ff"/>

      <stop offset="100%" stop-color="#00f0ff"/>

    </linearGradient>



    <radialGradient id="nebulaViolet" cx="20%" cy="30%" r="60%">

      <stop offset="0%" stop-color="#2a0a4a" stop-opacity="0.4"/>

      <stop offset="100%" stop-color="#030408" stop-opacity="0.95"/>

    </radialGradient>

    <radialGradient id="nebulaCyan" cx="80%" cy="70%" r="60%">

      <stop offset="0%" stop-color="#0a2e3f" stop-opacity="0.5"/>

      <stop offset="100%" stop-color="#030408" stop-opacity="0.95"/>

    </radialGradient>

    <radialGradient id="centerCore" cx="50%" cy="50%" r="40%">

      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.12"/>

      <stop offset="100%" stop-color="#030408" stop-opacity="0"/>

    </radialGradient>



    <path id="orbitPath" d="M 50,160 C 50,40 250,20 400,20 C 550,20 750,40 750,160 C 750,280 550,300 400,300 C 250,300 50,280 50,160 Z"/>

  </defs>



  <rect width="800" height="320" fill="#030408"/>

  <circle cx="200" cy="100" r="280" fill="url(#nebulaViolet)">

    <animate attributeName="r" values="280;310;280" dur="18s" repeatCount="indefinite"/>

  </circle>

  <circle cx="650" cy="220" r="280" fill="url(#nebulaCyan)">

    <animate attributeName="r" values="280;320;280" dur="22s" repeatCount="indefinite"/>

    <animate attributeName="opacity" values="0.7;1;0.7" dur="12s" repeatCount="indefinite"/>

  </circle>

  <circle cx="400" cy="160" r="250" fill="url(#centerCore)">

    <animate attributeName="r" values="200;260;200" dur="8s" repeatCount="indefinite"/>

  </circle>



  <g transform="translate(400, 160)" opacity="0.15">

    <circle cx="0" cy="0" r="140" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="2 6 8 4 20 10">

      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>

    </circle>

    <circle cx="0" cy="0" r="150" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-dasharray="40 20 10 20">

      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>

    </circle>

    <circle cx="0" cy="0" r="110" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-dasharray="4 4">

      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>

    </circle>

  </g>



  <g fill="none" stroke="#00f0ff" stroke-width="0.6" opacity="0.3" filter="url(#cyanGlow)">

    <polyline points="120,80 180,110 150,170 80,140 120,80"/>

    <polyline points="680,240 620,210 650,150 720,180 680,240"/>

    <circle cx="120" cy="80" r="2" fill="#00f0ff"><animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/></circle>

    <circle cx="180" cy="110" r="1.5" fill="#00f0ff"/>

    <circle cx="150" cy="170" r="2.5" fill="#00f0ff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>

    <circle cx="80" cy="140" r="1.5" fill="#00f0ff"/>

    

    <circle cx="680" cy="240" r="2" fill="#00f0ff"><animate attributeName="r" values="2;4;2" dur="4s" repeatCount="indefinite"/></circle>

    <circle cx="620" cy="210" r="1.5" fill="#00f0ff"/>

    <circle cx="650" cy="150" r="2.5" fill="#00f0ff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/></circle>

    <circle cx="720" cy="180" r="1.5" fill="#00f0ff"/>

  </g>



  <g id="starfield">

    <circle cx="280" cy="50" r="1.5" fill="#d4af37" filter="url(#goldGlow)"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite"/></circle>

    <circle cx="710" cy="80" r="2" fill="#d4af37" filter="url(#goldGlow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>

    <circle cx="140" cy="260" r="1.8" fill="#d4af37" filter="url(#goldGlow)"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="5s" repeatCount="indefinite"/></circle>

    <circle cx="520" cy="60" r="1.5" fill="#00f0ff" filter="url(#cyanGlow)"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.5s" repeatCount="indefinite"/></circle>

    <circle cx="220" cy="280" r="2" fill="#00f0ff" filter="url(#cyanGlow)"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.5s" repeatCount="indefinite"/></circle>

    <circle cx="90" cy="110" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/></circle>

    <circle cx="450" cy="30" r="1" fill="#ffffff"><animate attributeName="opacity" values="0;0.6;0" dur="6s" repeatCount="indefinite"/></circle>

    <circle cx="600" cy="290" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.5s" repeatCount="indefinite"/></circle>

    <circle cx="350" cy="240" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.8s" repeatCount="indefinite"/></circle>

  </g>



  <g fill="none" stroke-width="1.2" filter="url(#cyanGlow)" opacity="0.15">

    <path d="M -50,160 Q 200,80 400,160 T 850,160" stroke="#00f0ff">

      <animate attributeName="d" values="M -50,160 Q 200,80 400,160 T 850,160; M -50,150 Q 250,200 450,140 T 850,170; M -50,160 Q 200,80 400,160 T 850,160" dur="12s" repeatCount="indefinite"/>

    </path>

    <path d="M -50,180 Q 250,260 450,180 T 850,180" stroke="#d4af37">

      <animate attributeName="d" values="M -50,180 Q 250,260 450,180 T 850,180; M -50,190 Q 200,120 400,190 T 850,170; M -50,180 Q 250,260 450,180 T 850,180" dur="16s" repeatCount="indefinite"/>

    </path>

  </g>



  <text x="400" y="165" text-anchor="middle" fill="#00f0ff" font-family="'Playfair Display', 'Times New Roman', serif" font-size="64" font-weight="bold" letter-spacing="12" filter="url(#textAura)" opacity="0.4">

    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>

    NAYAN KUMAR

  </text>

  

  <text x="400" y="165" text-anchor="middle" fill="url(#goldWave)" font-family="'Playfair Display', 'Times New Roman', serif" font-size="64" font-weight="bold" letter-spacing="12" filter="url(#goldGlow)">NAYAN KUMAR</text>

  

  <text x="400" y="165" text-anchor="middle" fill="#ffffff" font-family="'Playfair Display', 'Times New Roman', serif" font-size="64" font-weight="bold" letter-spacing="12" opacity="0.9">NAYAN KUMAR</text>



  <line x1="300" y1="185" x2="500" y2="185" stroke="url(#cyanWave)" stroke-width="2" filter="url(#cyanGlow)" opacity="0.8">

    <animate attributeName="x1" values="300;320;300" dur="5s" repeatCount="indefinite"/>

    <animate attributeName="x2" values="500;480;500" dur="5s" repeatCount="indefinite"/>

  </line>

  

  <line x1="300" y1="185" x2="500" y2="185" stroke="#ffffff" stroke-width="0.5" opacity="0.9">

    <animate attributeName="x1" values="300;320;300" dur="5s" repeatCount="indefinite"/>

    <animate attributeName="x2" values="500;480;500" dur="5s" repeatCount="indefinite"/>

  </line>



  <text x="400" y="215" text-anchor="middle" fill="#d4af37" font-family="'Courier New', monospace" font-size="16" font-weight="bold" letter-spacing="8" opacity="0.9" filter="url(#goldGlow)">CLOUD SECURITY</text>

  <text x="400" y="245" text-anchor="middle" fill="#a0b4d4" font-family="Georgia, serif" font-size="13" font-style="italic" letter-spacing="2">Sculpting experiences where code meets craftsmanship</text>



  <g filter="url(#cyanGlow)">

    <circle r="10" fill="#0066ff" opacity="0"><animate attributeName="opacity" values="0;0.5" dur="0.4s" fill="freeze"/><animateMotion dur="14s" repeatCount="indefinite" begin="0s"><mpath href="#orbitPath"/></animateMotion></circle>

    <circle r="8" fill="#00f0ff" opacity="0"><animate attributeName="opacity" values="0;0.7" dur="0.4s" fill="freeze"/><animateMotion dur="14s" repeat

