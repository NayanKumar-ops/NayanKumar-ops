<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320"> <defs> <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"> <feGaussianBlur stdDeviation="4" result="coloredBlur"/> <feMerge> <feMergeNode in="coloredBlur"/> <feMergeNode in="SourceGraphic"/> </feMerge> </filter> <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%"> <feGaussianBlur stdDeviation="8" result="coloredBlur"/> <feMerge> <feMergeNode in="coloredBlur"/> <feMergeNode in="SourceGraphic"/> </feMerge> </filter> <!-- Natural mouse-movement path that flows around the text --> <path id="trail" d="M 70,240 C 100,100 240,30 380,110 C 460,155 430,220 360,240 C 280,265 200,210 170,270 C 150,310 240,290 380,295 C 500,298 640,270 710,180 C 760,120 730,60 640,50 C 540,38 500,110 540,175 C 580,240 680,280 730,250 C 770,225 780,170 760,130"/> </defs> <!-- Dark background --> <rect width="800" height="320" fill="#030303"/> <!-- Very subtle vignette corners --> <radialGradient id="vignette" cx="50%" cy="50%" r="70%"> <stop offset="60%" stop-color="transparent"/> <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/> </radialGradient> <rect width="800" height="320" fill="url(#vignette)"/> <!-- Corner bracket decorations --> <path d="M20,20 L52,20 L52,22 L22,22 L22,52 L20,52Z" fill="#D4AF37" opacity="0.55"/> <path d="M780,20 L748,20 L748,22 L778,22 L778,52 L780,52Z" fill="#D4AF37" opacity="0.55"/> <path d="M20,300 L52,300 L52,298 L22,298 L22,268 L20,268Z" fill="#D4AF37" opacity="0.55"/> <path d="M780,300 L748,300 L748,298 L778,298 L778,268 L780,268Z" fill="#D4AF37" opacity="0.55"/> <!-- Ambient floating particles --> <circle cx="55"  cy="55"  r="1.5" fill="#D4AF37"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.3s" repeatCount="indefinite"/></circle> <circle cx="745" cy="42"  r="1.2" fill="#D4AF37"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" repeatCount="indefinite"/></circle> <circle cx="160" cy="275" r="1.0" fill="#D4AF37"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.9s" repeatCount="indefinite"/></circle> <circle cx="655" cy="282" r="1.8" fill="#D4AF37"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/></circle> <circle cx="400" cy="22"  r="1.1" fill="#D4AF37"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/></circle> <circle cx="698" cy="130" r="0.9" fill="#ffffff"><animate attributeName="opacity" values="0.2;0.4;0.2" dur="3.4s" repeatCount="indefinite"/></circle> <circle cx="102" cy="155" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.7s" repeatCount="indefinite"/></circle> <circle cx="548" cy="292" r="1.3" fill="#D4AF37"><animate attributeName="opacity" values="0.4;0.85;0.4" dur="1.8s" repeatCount="indefinite"/></circle> <circle cx="320" cy="38"  r="0.9" fill="#D4AF37"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.6s" repeatCount="indefinite"/></circle> <circle cx="480" cy="290" r="1.1" fill="#ffffff" opacity="0.2"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="4.1s" repeatCount="indefinite"/></circle> <text x="400" y="98" text-anchor="middle" fill="#D4AF37" font-family="monospace" font-size="10" letter-spacing="11" opacity="0.65"> </text> <!-- Main heading --> <text x="400" y="168" text-anchor="middle" fill="#F5F5F5" font-family="Georgia,'Times New Roman',serif" font-size="54" font-weight="bold" letter-spacing="9" filter="url(#softglow)"> NAYAN KUMAR </text> <!-- Gold divider line --> <line x1="258" y1="183" x2="542" y2="183" stroke="#D4AF37" stroke-width="0.75" opacity="0.65"/> <!-- Subtitle --> <text x="400" y="209" text-anchor="middle" fill="#777777" font-family="monospace" font-size="12" letter-spacing="4"> CLOUD SECURITY </text> <!-- Italic tagline --> <text x="400" y="236" text-anchor="middle" fill="#444444" font-family="Georgia,serif" font-size="11.5" font-style="italic"> Sculpting experiences where code meets craftsmanship </text> <!-- ══════ CURSOR OUTLINE — lags 0.5s behind the dot ══════ --> <circle r="22" fill="rgba(212,175,55,0.04)" stroke="#D4AF37" stroke-width="1.4" opacity="0" filter="url(#glow)"> <!-- Fade in on load --> <animate attributeName="opacity" values="0;0.75" dur="0.6s" begin="0.5s" fill="freeze"/> <!-- Breathe --> <animate attributeName="opacity" values="0.75;0.42;0.75" dur="3.2s" begin="1s" repeatCount="indefinite"/> <!-- Move — starts 0.5s AFTER the dot so it visually trails behind --> <animateMotion dur="10s" repeatCount="indefinite" begin="0.5s"> <mpath href="#trail"/> </animateMotion> </circle> <!-- ══════ CURSOR DOT — leads the way ══════ --> <circle r="5" fill="#D4AF37" opacity="0" filter="url(#glow)"> <!-- Fade in on load --> <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze"/> <!-- Pulse --> <animate attributeName="r" values="5;6.2;5" dur="1.9s" begin="0.4s" repeatCount="indefinite"/> <!-- Move --> <animateMotion dur="10s" repeatCount="indefinite" begin="0s"> <mpath href="#trail"/> </animateMotion> </circle> <!-- ══════ FAINT TRAIL GHOST — even further behind ══════ --> <circle r="2.5" fill="#D4AF37" opacity="0.22" filter="url(#glow)"> <animateMotion dur="10s" repeatCount="indefinite" begin="1s"> <mpath href="#trail"/> </animateMotion> </circle> </svg>
