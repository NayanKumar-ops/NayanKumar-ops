<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybach Nayan · avant‑garde digital</title>
    
    <!-- Tailwind (core utilities) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & enhanced libraries -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Three.js, GSAP + ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
    
    <!-- smooth scrolling (optional but elevates feel) -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>

    <style>
        * { cursor: none; }
        body {
            background: #030303;
            color: #f0f0f0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        /* custom cursor — advanced magnetic feel */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .cursor-dot {
            width: 6px; height: 6px;
            background: #D4AF37;
            box-shadow: 0 0 15px #D4AF37;
        }
        .cursor-outline {
            width: 48px; height: 48px;
            border: 1.5px solid rgba(212, 175, 55, 0.5);
            backdrop-filter: blur(2px);
            transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
        }
        body:hover .cursor-outline {
            width: 70px; height: 70px;
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.03);
        }
        a, button, .magnetic {
            cursor: none;
        }
        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 0; }
        
        /* glassmorphism refined */
        .glass-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-right-color: rgba(212, 175, 55, 0.2);
            border-bottom-color: rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.8);
        }
        .text-gold-gradient {
            background: linear-gradient(145deg, #D4AF37 0%, #F2E2A5 45%, #D4AF37 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .reveal-mask {
            clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
        }
        .marquee {
            white-space: nowrap;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .marquee span {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }
        section, header, footer { position: relative; z-index: 5; }
        input, textarea { background: transparent; border-bottom: 1px solid #333; transition: 0.3s; }
        input:focus, textarea:focus { border-bottom-color: #D4AF37; outline: none; }
    </style>
</head>
<body class="antialiased selection:bg-maybach-gold selection:text-black">

   
