<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Security Interactive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #03050a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .container {
            width: 800px;
            height: 320px;
            background: #0a0f1a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .mouse-area {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: none;
        }
        .panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(145deg, #1a2a3a, #0f1a24);
            border-bottom: 2px solid #40c0ff;
            transform-origin: top;
            transition: transform 0.1s ease-out;
            box-shadow: 0 10px 20px rgba(64,192,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #b0f0ff;
        }
        .panel:nth-child(1) { height: 25%; top: 0; }
        .panel:nth-child(2) { height: 25%; top: 25%; }
        .panel:nth-child(3) { height: 25%; top: 50%; }
        .panel:nth-child(4) { height: 25%; top: 75%; }

        .data-content {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            color: #40c0ff;
            font-size: 2rem;
            font-weight: bold;
        }
        .data-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6aa0b0;
        }
        .cursor {
            width: 40px;
            height: 40px;
            border: 2px solid #40c0ff;
            border-radius: 50%;
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            mix-blend-mode: difference;
        }
        .cursor-dot {
            width: 6px;
            height: 6px;
            background: #40c0ff;
            border-radius: 50%;
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #40c0ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mouse-area" id="mouseArea">
            <div class="panel" id="panel1">🔒 Zero‑Trust Architecture</div>
            <div class="panel" id="panel2">🛡️ 5,000+ Threats Blocked</div>
            <div class="panel" id="panel3">☁️ 99.99% Uptime</div>
            <div class="panel" id="panel4">⚡ 15ms Global Response</div>
            <div class="data-content">
                <span class="data-label">SECURE CLOUD OPS</span><br>
                <span>NAYAN KUMAR</span>
            </div>
            <div class="cursor" id="cursorOutline"></div>
            <div class="cursor-dot" id="cursorDot"></div>
        </div>
    </div>
    <script>
        const area = document.getElementById('mouseArea');
        const panels = [document.getElementById('panel1'), document.getElementById('panel2'), document.getElementById('panel3'), document.getElementById('panel4')];
        const cursorOutline = document.getElementById('cursorOutline');
        const cursorDot = document.getElementById('cursorDot');

        area.addEventListener('mousemove', (e) => {
            const rect = area.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const percentY = y / rect.height; // 0 to 1

            // Update cursor
            cursorDot.style.left = x + 'px';
            cursorDot.style.top = y + 'px';
            cursorOutline.style.left = x + 'px';
            cursorOutline.style.top = y + 'px';

            // Expand panels based on mouse Y
            panels.forEach((panel, index) => {
                const panelTop = index * 0.25; // 0, 0.25, 0.5, 0.75
                const panelBottom = panelTop + 0.25;
                let scaleY = 1;
                if (percentY >= panelTop && percentY <= panelBottom) {
                    // Mouse inside this panel – expand
                    const distanceToCenter = Math.abs(percentY - (panelTop + 0.125));
                    const maxExpand = 1.8; // expand up to 180% height
                    scaleY = 1 + (maxExpand - 1) * (1 - distanceToCenter * 4); // peak at center
                }
                // Smooth transition
                panel.style.transform = `scaleY(${scaleY})`;
            });
        });

        area.addEventListener('mouseleave', () => {
            panels.forEach(panel => panel.style.transform = 'scaleY(1)');
        });
    </script>
</body>
</html>
