<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <!-- ===== ADVANCED FILTERS FOR DEPTH AND GLOW ===== -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 3D extrusion effect for text -->
    <filter id="extrude" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset in="SourceAlpha" dx="2" dy="2" result="offOut"/>
      <feGaussianBlur in="offOut" stdDeviation="2" result="blurOut"/>
      <feMerge>
        <feMergeNode in="blurOut"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- The flowing path – organic and graceful -->
    <path id="trail" d="M 70,240 C 100,100 240,30 380,110 C 460,155 430,220 360,240 C 280,265 200,210 170,270 C 150,310 240,290 380,295 C 500,298 640,270 710,180 C 760,120 730,60 640,50 C 540,38 500,110 540,175 C 580,240 680,280 730,250 C 770,225 780,170 760,130"/>
    
    <!-- Gradient for the name – liquid gold -->
    <linearGradient id="goldWave" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f5e6b0" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#f5e6b0;#d4af37;#f5e6b0" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="1">
        <animate attributeName="stop-color" values="#d4af37;#f9e076;#d4af37" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f5e6b0" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#f5e6b0;#d4af37;#f5e6b0" dur="6s" repeatCount="indefinite"/>
      </stop>
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    
    <!-- Subtle grid pattern for background -->
    <pattern id="grid" patternUnits="userSpaceOnUse" width="60" height="60" patternTransform="rotate(5)">
      <path d="M 0 0 L 60 0 M 0 0 L 0 60" stroke="#d4af37" stroke-width="0.15" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- ===== DEEP SPACE BACKGROUND WITH NEBULA ===== -->
  <rect width="800" height="320" fill="#03050a"/>
  <!-- Nebula glow -->
  <circle cx="200" cy="50" r="150" fill="url(#radialNebula)" opacity="0.2">
    <animate attributeName="r" values="150;180;150" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="200;220;200" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="270" r="200" fill="url(#radialNebula)" opacity="0.15">
    <animate attributeName="r" values="200;230;200" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="270;250;270" dur="22s" repeatCount="indefinite"/>
  </circle>
  <radialGradient id="radialNebula" cx="50%" cy="50%" r="50%">
    <stop offset="20%" stop-color="#3a2c1a" stop-opacity="0.2"/>
    <stop offset="80%" stop-color="#03050a" stop-opacity="0.8"/>
  </radialGradient>
  
  <!-- Fine grid overlay -->
  <rect width="800" height="320" fill="url(#grid)"/>
  
  <!-- ===== ELEGANT CORNER ACCENTS ===== -->
  <path d="M25,25 L50,25 L50,28 L28,28 L28,50 L25,50Z" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M775,25 L750,25 L750,28 L772,28 L772,50 L775,50Z" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M25,295 L50,295 L50,292 L28,292 L28,270 L25,270Z" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M775,295 L750,295 L750,292 L772,292 L772,270 L775,270Z" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- ===== SUBTLE STARFIELD (TWINKLING) ===== -->
  <g id="stars">
    <circle cx="120" cy="80" r="1.2" fill="#d4af37"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="40" r="0.9" fill="#ffffff"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="120" r="1.5" fill="#d4af37"><animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="200" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="250" r="0.8" fill="#d4af37"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="290" r="1.1" fill="#d4af37"><animate attributeName="opacity" values="0.1;0.45;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="40" r="0.7" fill="#ffffff"><animate attributeName="opacity" values="0.15;0.4;0.15" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== MAIN TITLE – LIQUID GOLD & 3D EFFECT ===== -->
  <text x="400" y="168" text-anchor="middle" fill="url(#goldWave)" font-family="'Playfair Display', 'Times New Roman', serif" font-size="58" font-weight="bold" letter-spacing="8" filter="url(#textglow)">
    NAYAN KUMAR
  </text>
  <!-- subtle extrusion shadow -->
  <text x="400" y="168" text-anchor="middle" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.15" font-family="'Playfair Display', 'Times New Roman', serif" font-size="58" font-weight="bold" letter-spacing="8" transform="translate(2,2)">
    NAYAN KUMAR
  </text>

  <!-- Divider line with animated pulse -->
  <line x1="260" y1="185" x2="540" y2="185" stroke="#d4af37" stroke-width="0.8" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="0.8;1.2;0.8" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle with elegant monospace -->
  <text x="400" y="210" text-anchor="middle" fill="#a0a0a0" font-family="'Courier New', monospace" font-size="13" letter-spacing="4">CLOUD SECURITY</text>

  <!-- Tagline with subtle italic -->
  <text x="400" y="238" text-anchor="middle" fill="#5a5a5a" font-family="Georgia, serif" font-size="12" font-style="italic">Sculpting experiences where code meets craftsmanship</text>

  <!-- ===== THE COMET – SMOOTHEST TRAIL EVER ===== -->
  <!-- Faint path outline (barely visible, adds depth) -->
  <path d="M 70,240 C 100,100 240,30 380,110 C 460,155 430,220 360,240 C 280,265 200,210 170,270 C 150,310 240,290 380,295 C 500,298 640,270 710,180 C 760,120 730,60 640,50 C 540,38 500,110 540,175 C 580,240 680,280 730,250 C 770,225 780,170 760,130" 
        fill="none" stroke="#d4af37" stroke-width="1.2" stroke-dasharray="8 20" opacity="0.1" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;1000" dur="35s" repeatCount="indefinite"/>
  </path>

  <!-- Trail particles – 30 circles with exponential decay for silky tail -->
  <!-- Lead dot (bright) -->
  <circle r="6" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze"/>
    <animate attributeName="r" values="6;7.5;6" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0s"><mpath href="#trail"/></animateMotion>
  </circle>

  <!-- Trail generator: 30 circles with decreasing size and opacity, increasing delay -->
  <!-- Using a script-like approach in pure SMIL: manually create 30 circles with gradual values -->
  <!-- r from 5.5 down to 0.8, opacity from 0.8 down to 0.05, delay from 0.1s to 2.0s -->
  <circle r="5.5" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" begin="0.1s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.1s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="5.3" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.75;0" dur="1.8s" begin="0.18s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.18s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="5.1" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.8s" begin="0.26s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.26s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="4.9" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.65;0" dur="1.8s" begin="0.34s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.34s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="4.7" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.8s" begin="0.42s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.42s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="4.5" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.55;0" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.5s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="4.3" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="1.8s" begin="0.58s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.58s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="4.1" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.45;0" dur="1.8s" begin="0.66s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.66s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="3.9" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="1.8s" begin="0.74s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.74s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="3.7" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.36;0" dur="1.8s" begin="0.82s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.82s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.32;0" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.9s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="3.3" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.28;0" dur="1.8s" begin="0.98s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.98s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="3.1" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.24;0" dur="1.8s" begin="1.06s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.06s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="2.9" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.21;0" dur="1.8s" begin="1.14s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.14s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="2.7" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0" dur="1.8s" begin="1.22s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.22s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="1.8s" begin="1.3s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.3s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="2.3" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.12;0" dur="1.8s" begin="1.38s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.38s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="2.1" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.1;0" dur="1.8s" begin="1.46s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.46s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="1.9" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.08;0" dur="1.8s" begin="1.54s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.54s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="1.7" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.06;0" dur="1.8s" begin="1.62s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.62s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="1.5" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.05;0" dur="1.8s" begin="1.7s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.7s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="1.3" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.04;0" dur="1.8s" begin="1.78s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.78s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="1.1" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.03;0" dur="1.8s" begin="1.86s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.86s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="0.9" fill="#d4af37" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.02;0" dur="1.8s" begin="1.94s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.94s"><mpath href="#trail"/></animateMotion>
  </circle>

  <!-- ===== FINAL TOUCH: ROTATING HALO AROUND NAME ===== -->
  <circle cx="400" cy="168" r="95" fill="none" stroke="url(#goldWave)" stroke-width="0.6" opacity="0.12" filter="url(#softglow)">
    <animate attributeName="r" values="95;105;95" dur="12s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 400 168" to="360 400 168" dur="40s" repeatCount="indefinite"/>
  </circle>
</svg>
