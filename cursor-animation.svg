<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <!-- Enhanced glow filters with larger blur for ethereal effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Extra glow for text depth -->
    <filter id="textglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Natural mouse-movement path that flows around the text (enhanced with subtle curves) -->
    <path id="trail" d="M 70,240 C 100,100 240,30 380,110 C 460,155 430,220 360,240 C 280,265 200,210 170,270 C 150,310 240,290 380,295 C 500,298 640,270 710,180 C 760,120 730,60 640,50 C 540,38 500,110 540,175 C 580,240 680,280 730,250 C 770,225 780,170 760,130"/>
    
    <!-- Starfield pattern (tiny dots) -->
    <pattern id="starfield" patternUnits="userSpaceOnUse" width="200" height="200">
      <circle cx="30" cy="40" r="0.8" fill="#D4AF37" opacity="0.3"/>
      <circle cx="150" cy="120" r="0.6" fill="#ffffff" opacity="0.2"/>
      <circle cx="80" cy="180" r="1" fill="#D4AF37" opacity="0.25"/>
      <circle cx="190" cy="60" r="0.5" fill="#ffffff" opacity="0.15"/>
      <circle cx="10" cy="150" r="0.7" fill="#D4AF37" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Dark background with starfield texture -->
  <rect width="800" height="320" fill="#030303"/>
  <rect width="800" height="320" fill="url(#starfield)" opacity="0.3"/>

  <!-- Very subtle vignette corners (enhanced with radial pulse) -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="800" height="320" fill="url(#vignette)"/>

  <!-- Corner bracket decorations (golden, with micro-animation) -->
  <path d="M20,20 L52,20 L52,22 L22,22 L22,52 L20,52Z" fill="#D4AF37" opacity="0.6">
    <animate attributeName="opacity" values="0.55;0.75;0.55" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M780,20 L748,20 L748,22 L778,22 L778,52 L780,52Z" fill="#D4AF37" opacity="0.6">
    <animate attributeName="opacity" values="0.55;0.75;0.55" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M20,300 L52,300 L52,298 L22,298 L22,268 L20,268Z" fill="#D4AF37" opacity="0.6">
    <animate attributeName="opacity" values="0.55;0.75;0.55" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M780,300 L748,300 L748,298 L778,298 L778,268 L780,268Z" fill="#D4AF37" opacity="0.6">
    <animate attributeName="opacity" values="0.55;0.75;0.55" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Enhanced floating particles (more stars, varied twinkling) -->
  <circle cx="55"  cy="55"  r="1.5" fill="#D4AF37"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="745" cy="42"  r="1.2" fill="#D4AF37"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="275" r="1.0" fill="#D4AF37"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="655" cy="282" r="1.8" fill="#D4AF37"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="22"  r="1.1" fill="#D4AF37"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="698" cy="130" r="0.9" fill="#ffffff"><animate attributeName="opacity" values="0.2;0.4;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="102" cy="155" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.35;0.1" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="548" cy="292" r="1.3" fill="#D4AF37"><animate attributeName="opacity" values="0.4;0.85;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="320" cy="38"  r="0.9" fill="#D4AF37"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="480" cy="290" r="1.1" fill="#ffffff"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="4.1s" repeatCount="indefinite"/></circle>
  <!-- Additional particles scattered across the canvas -->
  <circle cx="200" cy="100" r="0.7" fill="#D4AF37"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="180" r="1.0" fill="#ffffff"><animate attributeName="opacity" values="0.15;0.4;0.15" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="260" r="0.8" fill="#D4AF37"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="50" r="0.6" fill="#D4AF37"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.3s" repeatCount="indefinite"/></circle>
  <circle cx="530" cy="140" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="4.5s" repeatCount="indefinite"/></circle>

  <!-- Main heading with subtle gradient and enhanced glow -->
  <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#F5F5F5" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#F5F5F5" stop-opacity="0.9"/>
  </linearGradient>
  <text x="400" y="168" text-anchor="middle" fill="url(#goldGradient)" font-family="Georgia,'Times New Roman',serif" font-size="54" font-weight="bold" letter-spacing="9" filter="url(#textglow)">
    NAYAN KUMAR
    <!-- Animated shimmer across text -->
    <animate attributeName="fill" values="url(#goldGradient);#F5F5F5;url(#goldGradient)" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Gold divider line with subtle pulse -->
  <line x1="258" y1="183" x2="542" y2="183" stroke="#D4AF37" stroke-width="0.75" opacity="0.7">
    <animate attributeName="opacity" values="0.65;0.85;0.65" dur="2.7s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="400" y="209" text-anchor="middle" fill="#777777" font-family="monospace" font-size="12" letter-spacing="4">CLOUD SECURITY</text>

  <!-- Italic tagline -->
  <text x="400" y="236" text-anchor="middle" fill="#444444" font-family="Georgia,serif" font-size="11.5" font-style="italic">Sculpting experiences where code meets craftsmanship</text>

  <!-- ===== ADVANCED COMET TRAIL EFFECT ===== -->
  <!-- Visible dashed path following the trail (barely visible, adds depth) -->
  <path d="M 70,240 C 100,100 240,30 380,110 C 460,155 430,220 360,240 C 280,265 200,210 170,270 C 150,310 240,290 380,295 C 500,298 640,270 710,180 C 760,120 730,60 640,50 C 540,38 500,110 540,175 C 580,240 680,280 730,250 C 770,225 780,170 760,130" 
        fill="none" stroke="#D4AF37" stroke-width="1" stroke-dasharray="6 12" opacity="0.12" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;1000" dur="30s" repeatCount="indefinite"/>
  </path>

  <!-- Multiple trailing circles with decreasing size and opacity, creating a comet tail -->
  <!-- Group 1: Large faint outline (already exists) but we enhance with more -->
  <!-- Original outline (keep with adjusted timing) -->
  <circle r="22" fill="rgba(212,175,55,0.02)" stroke="#D4AF37" stroke-width="1.2" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.6" dur="0.6s" begin="0.5s" fill="freeze"/>
    <animate attributeName="r" values="22;24;22" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.5s"><mpath href="#trail"/></animateMotion>
  </circle>

  <!-- Additional trailing orbs (10 circles with increasing delay and decreasing size) -->
  <circle r="6.5" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.3;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.8s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="6" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.28;0" dur="2.1s" begin="0.95s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0.95s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="5.5" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.25;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.1s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="5" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.22;0" dur="2.3s" begin="1.25s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.25s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="4.5" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.19;0" dur="2.4s" begin="1.4s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.4s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="4" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.16;0" dur="2.5s" begin="1.55s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.55s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.13;0" dur="2.6s" begin="1.7s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.7s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="3" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.1;0" dur="2.7s" begin="1.85s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.85s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="2.5" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.07;0" dur="2.8s" begin="2.0s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="2.0s"><mpath href="#trail"/></animateMotion>
  </circle>
  <circle r="2" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.04;0" dur="2.9s" begin="2.15s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="2.15s"><mpath href="#trail"/></animateMotion>
  </circle>

  <!-- Lead dot (original) with enhanced pulse -->
  <circle r="5" fill="#D4AF37" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0s"><mpath href="#trail"/></animateMotion>
  </circle>

  <!-- Faint ghost trail (original but delayed more) -->
  <circle r="2.2" fill="#D4AF37" opacity="0.18" filter="url(#glow)">
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.2s"><mpath href="#trail"/></animateMotion>
  </circle>

  <!-- Additional tiny ghost for extra depth -->
  <circle r="1.5" fill="#ffffff" opacity="0.1" filter="url(#glow)">
    <animateMotion dur="10s" repeatCount="indefinite" begin="1.6s"><mpath href="#trail"/></animateMotion>
  </circle>

  <!-- ===== COSMIC MICRO-INTERACTIONS ===== -->
  <!-- Random floating "data dots" that move slowly in small loops (abstract) -->
  <circle cx="120" cy="80" r="0.9" fill="#D4AF37" opacity="0.4">
    <animate attributeName="cy" values="80;85;80" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="120;125;120" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="210" r="1.2" fill="#ffffff" opacity="0.3">
    <animate attributeName="cy" values="210;215;210" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="680;675;680" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="300" r="0.8" fill="#D4AF37" opacity="0.25">
    <animate attributeName="cy" values="300;295;300" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="280;285;280" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Ultra-thin horizontal scan line (barely visible) -->
  <line x1="0" y1="160" x2="800" y2="160" stroke="#D4AF37" stroke-width="0.3" opacity="0.08">
    <animate attributeName="y1" values="150;170;150" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="150;170;150" dur="12s" repeatCount="indefinite"/>
  </line>

  <!-- Final touch: a subtle rotating "halo" behind the name (invisible circle with glow) -->
  <circle cx="400" cy="168" r="90" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.08" filter="url(#softglow)">
    <animate attributeName="r" values="90;95;90" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.12;0.08" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
